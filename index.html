<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Proyecto AR Educativo</title>
    <!-- A-Frame: motor de escena web AR/VR -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js">
    </script>
    <!-- AR.js: librería de realidad aumentada con marcadores -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js">
    </script>
</head>

<body style="margin: 0; overflow: hidden;">
    <!-- 
a-scene: contenedor principal de la escena. 
arjs: activa el modo AR con cámara web. 
vr-mode-ui: desactiva el botón VR innecesario en AR. -->
    <a-scene embedded arjs="sourceType: webcam; 
debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <!-- ============================================ 
MARCADOR 1: Objeto educativo principal 
 ============================================ -->
        <a-marker preset="hiro">

            <!-- Modelo 3D principal (sustituir src por tu modelo .glb) -->
            <a-box id="objeto-principal" position="0 0.5 0" rotation="0 0 0" scale="1 1 1" color="#FF6600" animation="property: rotation; 
                     to: 0 360 0; 
                     loop: true; 
                     dur: 4000; 
                     easing: linear">
            </a-box>

            <!-- Texto informativo sobre el objeto -->
            <a-text value="AQUI VA TU TEXTO\nInformacion educativa" position="0 2 0" align="center" color="#FFFFFF"
                scale="1.5 1.5 1.5" background="true" background-color="#000000">
            </a-text>

            <!-- Plataforma base decorativa -->
            <a-cylinder position="0 0.05 0" radius="0.8" height="0.1" color="#333333" opacity="0.7">
            </a-cylinder>

            <!-- Declarar el asset (modelo 3D) en el head de la escena -->
            <a-assets>
                <a-asset-item id="mi-modelo" src="solar_system_model_orrery.glb">
                </a-asset-item>
            </a-assets>
            <!-- Usar el modelo dentro del marcador -->
            <a-gltf-model src="#mi-modelo" position="0 0.5 0" scale="0.5 0.5 0.5" animation="property: rotation; 
            to: 0 360 0; 
            loop: true; 
            dur: 5000">
            </a-gltf-model>
        </a-marker>

        <!-- MARCADOR 2: Información complementaria -->
        <a-marker type="pattern" url="https://raw.githubusercontent.com/AR-js
        org/AR.js/master/data/data/patt.kanji">
            <!-- Esfera con color temático -->
            <a-sphere position="0 0.5 0" radius="0.4" color="#0099FF" animation="property: scale; 
        from: 0.4 0.4 0.4;
        to: 0.6 0.6 0.6; 
        loop: true; 
        dir: alternate; 
        dur: 1000">
            </a-sphere>
            <!-- Texto secundario -->
            <a-text value="Dato adicional:\nEscribe aqui" position="0 1.5 0" align="center" color="#FFFF00"
                scale="1.2 1.2 1.2">
            </a-text>
        </a-marker>

        <!-- Cámara del dispositivo -->
        <a-entity camera></a-entity>

    </a-scene>

</body>

</html>
